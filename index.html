<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FastAPI JSON Bridge Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
        max-width: 900px;
      }
      .row {
        margin-bottom: 1rem;
      }
      input,
      button {
        font-size: 1rem;
        padding: 0.5rem;
      }
      pre {
        background: #f4f4f4;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 1rem;
        overflow: auto;
      }
      .error {
        color: #b00020;
      }
      .meta {
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>Secure JSON Proxy Viewer</h1>
    <p>
      Frontend calls FastAPI at <code>/api/search</code>; FastAPI fetches upstream JSON
      server-side to avoid browser CORS blocks.
    </p>

    <div class="row">
      <label for="query">Query (q): </label>
      <input id="query" type="text" value="[]" />
      <button id="loadBtn">Load Data</button>
    </div>

    <p id="status" class="meta">Idle</p>
    <pre id="output">No data loaded yet.</pre>

    <script>
      const API_BASE = "http://127.0.0.1:8000";
      const output = document.getElementById("output");
      const statusEl = document.getElementById("status");
      const queryEl = document.getElementById("query");
      const loadBtn = document.getElementById("loadBtn");

      async function loadData() {
        const q = queryEl.value.trim() || "[]";
        const endpoint = `${API_BASE}/api/search?q=${encodeURIComponent(q)}&format=json`;

        statusEl.textContent = "Loading...";
        statusEl.className = "meta";

        try {
          const response = await fetch(endpoint, {
            method: "GET",
            headers: {
              "Content-Type": "application/json",
            },
          });

          if (!response.ok) {
            const text = await response.text();
            throw new Error(`Backend error ${response.status}: ${text}`);
          }

          const payload = await response.json();
          statusEl.textContent = `Loaded successfully from ${payload.source}`;
          output.textContent = JSON.stringify(payload.data, null, 2);
        } catch (error) {
          statusEl.textContent = "Failed to load data.";
          statusEl.className = "error";
          output.textContent = error.message;
        }
      }

      loadBtn.addEventListener("click", loadData);
      loadData();
    </script>
  </body>
</html>
