<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConnectNet Fusion Pipeline API</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; max-width: 980px; }
      .row { margin-bottom: 1rem; }
      input, button, select { font-size: 1rem; padding: 0.45rem; }
      pre { background:#f4f4f4; border:1px solid #ddd; border-radius:8px; padding:1rem; overflow:auto; }
      .error { color:#b00020; }
      .meta { color:#555; }
    </style>
  </head>
  <body>
    <h1>ConnectNet Fusion Pipeline API</h1>
    <p><strong>Search → Crawl → Scrape → JSON API</strong></p>
    <p>A powerful real-time data pipeline that converts web queries into structured JSON.</p>

    <div class="row">
      <label for="query">Query (q): </label>
      <input id="query" type="text" value="" />
      <label for="mode">View:</label>
      <select id="mode">
        <option value="search">Raw proxy payload</option>
        <option value="pipeline" selected>Pipeline stages</option>
        <option value="overview">API overview</option>
      </select>
      <button id="loadBtn">Load Data</button>
    </div>

    <p id="status" class="meta">Idle</p>
    <pre id="output">No data loaded yet.</pre>

    <script>
      const API_BASE = "http://127.0.0.1:8000";
      const output = document.getElementById("output");
      const statusEl = document.getElementById("status");
      const queryEl = document.getElementById("query");
      const modeEl = document.getElementById("mode");
      const loadBtn = document.getElementById("loadBtn");

      async function loadData() {
        const q = queryEl.value.trim();
        const mode = modeEl.value;
        const route = mode === "pipeline" ? "/api/pipeline" : mode === "overview" ? "/api/overview" : "/api/search";
        const queryParams = new URLSearchParams();
        if (mode !== "overview") queryParams.set("q", q);
        if (mode === "search") queryParams.set("format", "json");
        const qs = queryParams.toString();
        const endpoint = `${API_BASE}${route}${qs ? `?${qs}` : ""}`;

        statusEl.textContent = "Loading...";
        statusEl.className = "meta";

        try {
          const response = await fetch(endpoint, { method: "GET", headers: { "Content-Type": "application/json" } });
          if (!response.ok) {
            const text = await response.text();
            throw new Error(`Backend error ${response.status}: ${text}`);
          }
          const payload = await response.json();
          statusEl.textContent = "Loaded successfully.";
          output.textContent = JSON.stringify(payload, null, 2);
        } catch (error) {
          statusEl.textContent = "Failed to load data.";
          statusEl.className = "error";
          output.textContent = error?.message || "Unknown error";
        }
      }

      loadBtn.addEventListener("click", loadData);
      loadData().catch((error) => {
        statusEl.textContent = "Initial load failed.";
        statusEl.className = "error";
        output.textContent = error?.message || "Unknown error";
      });
    </script>
  </body>
</html>
