services:
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
  search:
    build: .
    environment:
      REDIS_URL: redis://redis:6379/0
      ENABLE_BING_FALLBACK: "false"
    ports:
      - "8000:8000"
    depends_on:
      - redis
