services:
  web:
    build: .
    environment:
      REDIS_URL: redis://redis:6379/0
      DEFAULT_SEARCH_ENGINE: connectnet
      # Add more JSON-capable engines with SEARCH_ENGINES_JSON or SEARXNG_SEARCH_URL.
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
