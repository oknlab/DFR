services:
  web:
    build: .
    environment:
      REDIS_URL: redis://redis:6379/0
      DEFAULT_SEARCH_ENGINE: connectnet
      STRICT_PRIVACY_MODE: "true"
      CACHE_SEARCH_RESULTS: "false"
      HIDE_PROMOTED_RESULTS: "true"
      SEARCH_FALLBACK_ENGINE: bing
      # Add more JSON-capable engines with SEARCH_ENGINES_JSON, *_SEARCH_URL, or SEARCH_BANGS_JSON.
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
