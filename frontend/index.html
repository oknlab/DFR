<!doctype html>
<html lang="en" data-theme="oknlab">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <title>OKNLAB Privacy Search</title>
    <script>
      window.tailwind = {
        config: {
          theme: {
            extend: {
              colors: { oknlab: { ink: '#020617', mint: '#34d399' } },
            },
          },
        },
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <main class="min-h-screen bg-slate-950 px-6 py-10 text-white">
        <section class="mx-auto max-w-5xl rounded-3xl border border-emerald-300/20 bg-slate-900/70 p-8 shadow-2xl">
          <p class="mb-3 text-sm uppercase tracking-[0.35em] text-emerald-200">OKNLAB</p>
          <h1 class="text-4xl font-black">Privacy Search</h1>
          <p class="mt-4 max-w-2xl text-slate-300">Loading the Vue 3 search interface. If it does not appear, ensure browser JavaScript and CDN access are enabled.</p>
          <footer class="mt-10 border-t border-white/10 pt-5 text-sm text-slate-400">Built by OKNLAB</footer>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
